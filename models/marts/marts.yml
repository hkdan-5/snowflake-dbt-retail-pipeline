version: 2

models:
  - name: fct_orders
    description: "Central fact table containing order line transactions with foreign keys and additive business measures."
    columns:
      - name: order_line_key
        description: "Unique key for each order line."
        data_tests:
          - not_null
          - unique

      - name: order_id
        description: "Order identifier."
        data_tests:
          - not_null

      - name: order_date
        description: "Foreign key to the date dimension via dim_dates.date_day."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_dates')
              field: date_day

      - name: customer_id
        description: "Foreign key to the customer dimension."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_customers')
              field: customer_id

      - name: product_id
        description: "Foreign key to the product dimension."
        data_tests:
          - not_null
          - relationships:
              to: ref('dim_products')
              field: product_id

      - name: quantity
        description: "Number of units ordered."

      - name: unit_price
        description: "Unit price at the time of the order."

      - name: line_amount
        description: "Revenue amount for the order line."

models:
  - name: dim_customers
    description: "Customer dimension table containing descriptive customer attributes for analytics and reporting."
    columns:
      - name: customer_id
        description: "Unique identifier for each customer."
        data_tests:
          - not_null
          - unique

      - name: customer_name
        description: "Full name of the customer."

      - name: city
        description: "Customer city."

      - name: country
        description: "Customer country."

      - name: signup_date
        description: "Date when the customer signed up."

  - name: dim_products
    description: "Product dimension table containing descriptive product attributes for analytics and reporting."
    columns:
      - name: product_id
        description: "Unique identifier for each product."
        data_tests:
          - not_null
          - unique

      - name: product_name
        description: "Name of the product."

      - name: category
        description: "Product category."

      - name: price
        description: "Standard product price."

  - name: dim_dates
    description: "Date dimension derived from order dates to support time-based reporting."
    columns:
      - name: date_day
        description: "Calendar date."
        data_tests:
          - not_null
          - unique

      - name: year_number
        description: "Year extracted from the calendar date."

      - name: month_number
        description: "Month extracted from the calendar date."

      - name: month_name
        description: "Short month name extracted from the calendar date."

      - name: quarter_number
        description: "Quarter extracted from the calendar date."

      - name: year_month
        description: "Year-month representation in YYYY-MM format."

