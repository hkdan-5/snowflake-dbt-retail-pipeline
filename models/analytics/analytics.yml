version: 2

models:
  - name: kpi_daily_sales
    description: "Daily sales KPI model showing order volume, units sold, revenue, and average order value by day."
    columns:
      - name: order_date
        description: "Calendar date of the order activity."
        data_tests:
          - not_null
          - unique

      - name: total_orders
        description: "Number of distinct orders per day."

      - name: total_units
        description: "Total number of units sold per day."

      - name: total_revenue
        description: "Total revenue generated per day."

      - name: average_order_value
        description: "Average revenue per order for the day."

  - name: kpi_customer_overview
    description: "Customer-level KPI model showing order history and lifetime value."
    columns:
      - name: customer_id
        description: "Unique identifier for each customer."
        data_tests:
          - not_null
          - unique

      - name: customer_name
        description: "Full name of the customer."

      - name: orders_count
        description: "Number of distinct orders placed by the customer."

      - name: lifetime_value
        description: "Total revenue generated by the customer."

      - name: first_order_date
        description: "Date of the customer's first recorded order."

      - name: last_order_date
        description: "Date of the customer's most recent recorded order."

  - name: kpi_product_performance
    description: "Product-level KPI model showing sales volume and revenue performance."
    columns:
      - name: product_id
        description: "Unique identifier for each product."
        data_tests:
          - not_null
          - unique

      - name: product_name
        description: "Name of the product."

      - name: category
        description: "Category of the product."

      - name: orders_count
        description: "Number of distinct orders containing the product."

      - name: units_sold
        description: "Total units sold for the product."

      - name: revenue
        description: "Total revenue generated by the product."